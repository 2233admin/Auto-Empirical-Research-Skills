<svg xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif" viewBox="0 0 1080 1700"><rect width="1080" height="1700" fill="#FFF"/><text x="540" y="90" fill="#111827" font-size="48" font-weight="700" text-anchor="middle">六阶段扫描方法论</text><text x="540" y="145" fill="#6B7280" font-size="28" text-anchor="middle">自动化 + 人工 + 多 Agent 并行 · 多层防御</text><line x1="180" x2="180" y1="240" y2="1500" stroke="#A7F3D0" stroke-width="6"/><circle cx="180" cy="280" r="40" fill="#059669"/><text x="180" y="293" fill="#FFF" font-size="32" font-weight="700" text-anchor="middle">1</text><rect width="760" height="170" x="260" y="240" fill="#ECFDF5" stroke="#10B981" stroke-width="2" rx="12"/><text x="290" y="290" fill="#065F46" font-size="34" font-weight="700">Phase 1 · 自动化模式扫描</text><text x="290" y="335" fill="#374151" font-size="26">grep 13 类风险模式 · pipe-to-shell / 反向 shell /</text><text x="290" y="370" fill="#374151" font-size="26">凭据外泄 / 解码执行 / 挖矿 RAT 签名 / Prompt 注入</text><circle cx="180" cy="490" r="40" fill="#059669"/><text x="180" y="503" fill="#FFF" font-size="32" font-weight="700" text-anchor="middle">2</text><rect width="760" height="170" x="260" y="450" fill="#ECFDF5" stroke="#10B981" stroke-width="2" rx="12"/><text x="290" y="500" fill="#065F46" font-size="34" font-weight="700">Phase 2 · Hook 与权限矩阵审查</text><text x="290" y="545" fill="#374151" font-size="26">6 个含 hook 的 skill · 40+ hook 脚本 100% 人工核查</text><text x="290" y="580" fill="#374151" font-size="26">权限 allow list 全部为研究工具 · 无 Bash(*) 通配</text><circle cx="180" cy="700" r="40" fill="#059669"/><text x="180" y="713" fill="#FFF" font-size="32" font-weight="700" text-anchor="middle">3</text><rect width="760" height="200" x="260" y="660" fill="#ECFDF5" stroke="#10B981" stroke-width="2" rx="12"/><text x="290" y="710" fill="#065F46" font-size="34" font-weight="700">Phase 3-5 · 三 Agent 并行内容审查</text><text x="290" y="755" fill="#374151" font-size="26">SKILL.md 散文 · agent 定义 · reference 文档</text><text x="290" y="790" fill="#374151" font-size="26">查 prompt injection · 后门 · 隐藏 Unicode</text><text x="290" y="825" fill="#374151" font-size="26">违背用户意图指令 · 异常大文件 · 可疑包源</text><circle cx="180" cy="940" r="40" fill="#059669"/><text x="180" y="953" fill="#FFF" font-size="32" font-weight="700" text-anchor="middle">4</text><rect width="760" height="170" x="260" y="900" fill="#ECFDF5" stroke="#10B981" stroke-width="2" rx="12"/><text x="290" y="950" fill="#065F46" font-size="34" font-weight="700">Phase 6 · 补充完整性检查</text><text x="290" y="995" fill="#374151" font-size="26">隐藏字符 / 编码异常 / 极长行 / HTML 注入</text><text x="290" y="1030" fill="#374151" font-size="26">环境变量访问 / 网络相关 import / 高比例非 ASCII</text><rect width="920" height="320" x="80" y="1130" fill="#059669" rx="16"/><text x="540" y="1210" fill="#A7F3D0" font-size="36" font-weight="600" text-anchor="middle">综合结论</text><text x="540" y="1320" fill="#FFF" font-size="84" font-weight="700" text-anchor="middle">All Clean</text><text x="540" y="1390" fill="#D1FAE5" font-size="30" text-anchor="middle">52 个 Skill 在所有维度均未触发威胁信号</text><text x="540" y="1640" fill="#9CA3AF" font-size="22" text-anchor="middle">数据来源：SECURITY-SCAN-REPORT.md Phase 1-6</text></svg>