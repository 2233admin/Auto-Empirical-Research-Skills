<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 900"><rect width="1080" height="900" fill="#FFF"/><text x="540" y="60" fill="#1E293B" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" text-anchor="middle">因果推断方法的逻辑层次</text><text x="540" y="100" fill="#6B7280" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" text-anchor="middle">内部效度从上到下递减，方法复杂度从左到右递增</text><rect width="960" height="100" x="60" y="140" fill="#2563EB" rx="12"/><text x="540" y="180" fill="#FFF" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" text-anchor="middle">第一层：随机对照试验（RCT）</text><text x="540" y="218" fill="#FFF" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" text-anchor="middle">随机分组 → 因果识别最可信 | 但成本高、外部效度受限</text><polygon fill="#3B82F6" points="540 250 520 250 540 275 560 250"/><rect width="960" height="180" x="60" y="285" fill="#3B82F6" rx="12"/><text x="540" y="325" fill="#FFF" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" text-anchor="middle">第二层：准自然实验</text><rect width="200" height="50" x="90" y="345" fill="#FFF" rx="8"/><text x="190" y="377" fill="#3B82F6" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" text-anchor="middle">IV 工具变量</text><rect width="200" height="50" x="310" y="345" fill="#FFF" rx="8"/><text x="410" y="377" fill="#3B82F6" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" text-anchor="middle">RDD 断点回归</text><rect width="200" height="50" x="530" y="345" fill="#FFF" rx="8"/><text x="630" y="377" fill="#3B82F6" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" text-anchor="middle">DID 双重差分</text><rect width="240" height="50" x="750" y="345" fill="#FFF" rx="8"/><text x="870" y="377" fill="#3B82F6" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" text-anchor="middle">SCM 合成控制</text><text x="540" y="430" fill="#FFF" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" text-anchor="middle">利用政策变化、制度断点等&quot;自然随机性&quot;构造对照组</text><polygon fill="#60A5FA" points="540 475 520 475 540 500 560 475"/><rect width="960" height="150" x="60" y="510" fill="#60A5FA" rx="12"/><text x="540" y="550" fill="#FFF" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" text-anchor="middle">第三层：观察性研究方法</text><rect width="200" height="50" x="90" y="570" fill="#FFF" rx="8"/><text x="190" y="602" fill="#60A5FA" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" text-anchor="middle">PSM 倾向匹配</text><rect width="220" height="50" x="310" y="570" fill="#FFF" rx="8"/><text x="420" y="602" fill="#60A5FA" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" text-anchor="middle">Heckman 两阶段</text><rect width="220" height="50" x="550" y="570" fill="#FFF" rx="8"/><text x="660" y="602" fill="#60A5FA" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" text-anchor="middle">面板固定效应</text><rect width="200" height="50" x="790" y="570" fill="#FFF" rx="8"/><text x="890" y="602" fill="#60A5FA" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" text-anchor="middle">OLS + 控制</text><polygon fill="#93C5FD" points="540 670 520 670 540 695 560 670"/><rect width="960" height="120" x="60" y="705" fill="#93C5FD" rx="12"/><text x="540" y="745" fill="#1E293B" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" text-anchor="middle">第四层：ML + 因果推断（2020s 前沿）</text><rect width="200" height="40" x="90" y="765" fill="#FFF" rx="8"/><text x="190" y="792" fill="#1E293B" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" text-anchor="middle">DML 双重机器学习</text><rect width="200" height="40" x="310" y="765" fill="#FFF" rx="8"/><text x="410" y="792" fill="#1E293B" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" text-anchor="middle">因果森林</text><rect width="200" height="40" x="530" y="765" fill="#FFF" rx="8"/><text x="630" y="792" fill="#1E293B" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" text-anchor="middle">Meta Learners</text><rect width="240" height="40" x="750" y="765" fill="#FFF" rx="8"/><text x="870" y="792" fill="#1E293B" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" text-anchor="middle">交错DID新方法</text><text x="540" y="870" fill="#9CA3AF" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" text-anchor="middle">数据来源：Rubin因果模型框架、IZA World of Labor、CausalML Book</text></svg>